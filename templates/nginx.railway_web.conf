server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Flutter CanvasKit / WASM — set type without add_header (add_header
    # Content-Type stacks with mime.types → "application/wasm,application/wasm"
    # which browsers reject, leaving a blank Flutter canvas).
    location ~* \.wasm$ {
        types { }
        default_type application/wasm;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|otf|json)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
