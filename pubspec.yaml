name: podfly
description: >
  Deploy Serverpod + Flutter web — split (Cloudflare Pages + Fly) or all-on-Fly,
  with doctor, init wizard, and database providers (none, sqlite, fly postgres, neon).
version: 0.1.0
repository: https://github.com/127thousand/podfly
homepage: https://github.com/127thousand/podfly

environment:
  sdk: ^3.5.0

executables:
  podfly: podfly

dependencies:
  args: ^2.5.0
  path: ^1.9.0
  yaml: ^3.1.2
  io: ^1.0.4

dev_dependencies:
  lints: ^5.0.0
  test: ^1.25.0
