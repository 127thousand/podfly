name: podfly
description: >
  Deploy Serverpod apps on Fly.io, Railway, DigitalOcean, and more via existing
  cloud CLIs. Thin orchestrator (not a host): podfly.yaml, Docker/fly/railway/DO
  quirks, Flutter web packaging, Postgres wiring, smoke checks.
version: 0.4.1
repository: https://github.com/127thousand/podfly
homepage: https://github.com/127thousand/podfly
issue_tracker: https://github.com/127thousand/podfly/issues
documentation: https://github.com/127thousand/podfly/blob/main/doc/README.md

topics:
  - serverpod
  - deploy
  - cli
  - fly
  - railway

environment:
  sdk: ^3.5.0

executables:
  podfly: podfly

dependencies:
  args: ^2.5.0
  path: ^1.9.0
  yaml: ^3.1.2
  io: ^1.0.4

dev_dependencies:
  lints: ^5.0.0
  test: ^1.25.0
