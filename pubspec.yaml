name: podfly
description: >
  Orchestrate Serverpod deploys on existing clouds via their CLIs (fly, wrangler,
  neonctl, …). Encodes config quirks; not a host. Fly + Pages + Neon today.
version: 0.1.0
repository: https://github.com/127thousand/podfly
homepage: https://github.com/127thousand/podfly

environment:
  sdk: ^3.5.0

executables:
  podfly: podfly

dependencies:
  args: ^2.5.0
  path: ^1.9.0
  yaml: ^3.1.2
  io: ^1.0.4

dev_dependencies:
  lints: ^5.0.0
  test: ^1.25.0
