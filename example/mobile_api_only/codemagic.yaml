# Generated by podfly — Codemagic mobile CI for Serverpod monorepo.
#
# API is deployed separately: podfly deploy --api
# This file only builds Flutter iOS/Android against that API URL.
#
# Setup:
#   1. Push this repo and add it in https://codemagic.io
#   2. Add signing (iOS distribution + Play service account)
#   3. Run workflow ios-ipa / android-appbundle from the UI
#      or: POST https://api.codemagic.io/builds  (x-auth-token)
#
# podfly does not overwrite this file once it exists.
# Sync SERVER_URL with web.api_url in podfly.yaml when the API host changes.
#
# Docs: https://docs.codemagic.io/flutter-configuration/flutter-projects/
#       https://github.com/127thousand/podfly/blob/main/doc/codemagic.md

workflows:
  ios-ipa:
    name: iOS IPA
    max_build_duration: 60
    instance_type: mac_mini_m2

    # integrations:
    #   app_store_connect: <name from Teams → Integrations>

    environment:
      # Create group "ios_signing" in Codemagic for CERTIFICATE_PRIVATE_KEY etc.
      groups:
        - ios_signing
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: com.example.app
        SERVER_URL: https://podfly-api-only-demo.fly.dev

    cache:
      cache_paths:
        - $HOME/.pub-cache
        - $CM_BUILD_DIR/mobile_api_only_flutter/ios/Pods

    scripts:
      - name: Get Flutter packages
        script: |
          cd mobile_api_only_flutter
          flutter pub get
      - name: Install CocoaPods dependencies
        script: |
          cd mobile_api_only_flutter/ios
          pod install
      - name: Set up code signing settings on Xcode project
        script: |
          # Requires Codemagic CLI tools (preinstalled on CM Macs)
          # and ios_signing group. See doc/codemagic.md.
          xcode-project use-profiles || true
      - name: Flutter build ipa
        script: |
          cd mobile_api_only_flutter
          flutter build ipa --release \
            --dart-define=SERVER_URL=$SERVER_URL \
            --export-options-plist=/Users/builder/export_options.plist \
            || flutter build ipa --release \
              --dart-define=SERVER_URL=$SERVER_URL

    artifacts:
      - mobile_api_only_flutter/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    # publishing:
    #   app_store_connect:
    #     auth: integration
    #     submit_to_testflight: true
    # Set mobile.codemagic.publish_testflight: true + app_store_connect in podfly.yaml

  android-appbundle:
    name: Android App Bundle
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      # Create group "android_signing" with CM_KEYSTORE / passwords.
      groups:
        - android_signing
      flutter: stable
      vars:
        PACKAGE_NAME: com.example.app
        SERVER_URL: https://podfly-api-only-demo.fly.dev

    cache:
      cache_paths:
        - $HOME/.pub-cache

    scripts:
      - name: Set up local.properties
        script: |
          echo "flutter.sdk=$HOME/programs/flutter" > "$CM_BUILD_DIR/mobile_api_only_flutter/android/local.properties"
      - name: Get Flutter packages
        script: |
          cd mobile_api_only_flutter
          flutter pub get
      - name: Flutter build appbundle
        script: |
          cd mobile_api_only_flutter
          flutter build appbundle --release \
            --dart-define=SERVER_URL=$SERVER_URL

    artifacts:
      - mobile_api_only_flutter/build/app/outputs/**/*.aab

    # publishing:
    #   google_play:
    #     credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
    #     track: internal
    # Set mobile.codemagic.publish_play: true when ready

