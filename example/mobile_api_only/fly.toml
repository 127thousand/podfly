# Fly.io — Serverpod API (generated by podfly)
# Flutter UI may live on Cloudflare Pages when mode: split

app = "mobile-api-only"
primary_region = "iad"

[build]
  dockerfile = "mobile_api_only_server/Dockerfile"

[env]
  runmode = "production"
  SERVERPOD_RUN_MODE = "production"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "1024mb"
  cpus = 1
